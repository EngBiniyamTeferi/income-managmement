<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Management</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
 <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@400..700&family=Playwrite+IN+Guides&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 id="title">
            Income Management Platform
        </h1>
       <button id="downloadBtn" class="btn btn-success">
  Download Excel
</button>
        <div class="TotalIncome bg-warning p-2 m-2">
            <h2>Total Income</h2>
            <div class="inputsection">
                <input type="number" class="m-2" id="income" placeholder="sum of your total income here" required>
                <button class="btn btn-primary" onclick="addExpenses()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-circle" viewBox="0 0 16 16">
      <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
      <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
    </svg><span class="d-none d-md-block">Add Expenses</span></button>
            </div>
        </div>

        <div class="bg-secondary" id="expenses">

        </div>

        <div class="remaining bg-dark m-2">
            <h3 id="Total_income">Total Income: 0</h3>
            <h3 id="total_expense">Total Expense: 0</h3>
            <h3 id="remaining">Remaining Budget: 0</h3>

        </div>
    </div>
<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;

    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url("https://images.unsplash.com/photo-1603777953662-5310c93eeb1c?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
        background-size:100%;
    }

    .container   {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
    }
   #title {
    font-family: "Dancing Script";
    font-weight: bold;
    color: white;
   }
   .TotalIncome {
    width: 90%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
   }

   .TotalIncome h2 {
    text-decoration: underline;
   }
.inputsection {
    width: 90%;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.inputsection button{
    display: flex;
    align-items: center;
    justify-content: center;
}
   .TotalIncome input {
    width: 60%;
        height: 50%;
        padding-left: 7px;
        text-transform: capitalize;
        outline: none;
        background: transparent;
        border: none;
        border-bottom: 3px solid black;

   }
   .TotalIncome button {
    width: 30%;
    height: 50%;
    text-align: center;
   }

   .remaining {
    width: 90%;
    height: 120px;
    overflow: hidden;
word-break: break-all;
overflow-y: scroll;
color: white;
padding-left: 12px;
}

#expenses {
    height: 400px;
    width: 90%;
    overflow: hidden;
    overflow-y: scroll;
    position: relative;
    top: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#expenses div {
    width: 95%;
    margin: 4px;
}
#expenses input {
    margin-left: 12px;
    width: 32%;
    height: auto;
    padding-left: 7px;
    background: transparent;
    outline: none;
    border: none;
    border-bottom: 2px solid black;
            color: white;
}

#expenses input::placeholder{
    color: white;
    text-transform: capitalize;
}
#expenses button {
    margin-left: 12px;
width: 20%;
}

::-webkit-scrollbar {
    width: 7px;
}

::-webkit-scrollbar-thumb {
    cursor: pointer;
    background: white;
    border-radius: 7px;
}
</style>
    <script>
        let Income = document.getElementById("income")
let expenses = document.getElementById("expenses")
let Total_income = document.getElementById("Total_income")
let total_expense = document.getElementById("total_expense")
let remaining = document.getElementById("remaining")
let totalExpense = 0;
let TotalIncome = 0
let remaining_money = 0
        function addExpenses() {
            // creating elements
            let div = document.createElement("div")
            let reason = document.createElement("input")
            let expense = document.createElement("input")
            let trash = document.createElement("button")
// naming and giving an identity for the elements which are created now
            trash.innerHTML = "delete"
trash.className = "btn btn-danger"
            reason.placeholder = "reason for the expense"
            reason.id = "reason"
            reason.type = "text"
            expense.placeholder = "how much does it cost?"
            expense.id = "expense_1"
            expense.type = "number"
            
            // assigning them on to the divider that is created with them
            div.appendChild(reason)
            div.appendChild(expense)
            div.appendChild(trash)

            // appending the newly created divider to the expenses page
            expenses.append(div)

// delete the new created divider and its contents
            trash.onclick = function () 
            {
                div.remove()
                // call out for calculator to continue the calculation even when the divider is removed
                calculate()
            }

        }



function calculate() {

TotalIncome = Income.value
// selecting all input from the expenses category
    let allExpenses = expenses.querySelectorAll("input[type='Number']")
    allExpenses.forEach(element => {
        // as the data comes out as a string it has to be changed to a Number
        totalExpense += Number(element.value) || 0;
    });

    // calculates the remaining money left
    remaining_money = TotalIncome - totalExpense

    // printing them on the browser
    // using a thousand separator
Total_income.innerHTML= `Total Income: ${TotalIncome.toLocaleString()}`
total_expense.innerHTML= `Total Expense: ${totalExpense.toLocaleString()}`
remaining.innerHTML= `Remaining Budget: ${remaining_money.toLocaleString()}`

// it erases the value when recalled
totalExpense = 0
TotalIncome = 0
remaining_money = 0

}

// calls out the calculator function each time when data entry happen
Income.addEventListener("input",calculate)
expenses.addEventListener("input",calculate)
    


    </script>

    <script src="export.js"></script>
</body>
</html>
